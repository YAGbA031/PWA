<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshFlow App</title>
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Theme color -->
    <meta name="theme-color" content="#4facfe">
    
    <!-- Apple iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
    <link rel="icon" href="/icons/favicon.ico">

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #e0f7fa, #f0f8ff);
        }
        .app {
            max-width: 420px;
            margin: 50px auto;
            background: #ffffff;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: center;
        }
        h1 {
            color: #4facfe;
            margin-bottom: 10px;
        }
        p {
            color: #555;
            font-size: 16px;
        }
        button {
            background: #4facfe;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 16px;
            width: 100%;
            margin: 20px 0;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #36a0f0;
        }
        ul {
            text-align: left;
            padding-left: 20px;
        }
        li {
            margin-bottom: 8px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="app">
        <h1>💧 FreshFlow</h1>
        <p>Welcome! Install me on your phone for a smooth experience.</p>
        <button onclick="alert('Thanks for visiting!')">Get Started</button>
        
        <div style="margin-top: 30px;">
            <h3>Features:</h3>
            <ul>
                <li>✓ Native install prompt</li>
                <li>✓ Works offline</li>
                <li>✓ Fast & reliable</li>
            </ul>
        </div>
    </div>

    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                .then(reg => console.log('SW registered:', reg))
                .catch(err => console.log('SW registration failed:', err));
            });
        }
        
        // Track install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            console.log('✅ Ready to show install prompt');
        });
        
        window.addEventListener('appinstalled', () => {
            console.log('✅ App installed');
        });
    </script>
</body>
</html>
